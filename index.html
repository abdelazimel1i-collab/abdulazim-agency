<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبدالعظيم | حلول التسويق الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .gradient-text { background: linear-gradient(90deg, #ffffff, #888888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-saudi { background-color: white; color: black; transition: 0.3s; }
        .btn-saudi:hover { background-color: #1D6D2E; color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-black uppercase tracking-tighter">ABDULAZIM</div>
        <a href="https://wa.me/yournumber" class="btn-saudi px-6 py-2 rounded-full font-bold text-sm">تواصل معنا</a>
    </nav>

    <section class="h-[80vh] flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-5xl md:text-8xl font-black mb-6 gradient-text">نصنع أثراً <br> رقمياً لا يُنسى</h1>
        <p class="text-gray-400 max-w-xl text-lg md:text-xl mb-8">
            وكالة تسويق سعودية متخصصة في نمو المتاجر الإلكترونية وتقديم حلول الميديا باينج باحترافية.
        </p>
        <div class="flex gap-4">
            <button class="btn-saudi px-10 py-4 rounded-lg font-black text-lg shadow-xl">ابدأ مشروعك الآن</button>
        </div>
    </section>

    <footer class="p-10 text-center border-t border-gray-900 text-gray-600">
        © 2026 جميع الحقوق محفوظة لـ عبدالعظيم
    </footer>
</body>
</html>
